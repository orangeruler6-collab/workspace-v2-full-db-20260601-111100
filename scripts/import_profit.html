<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><title>导入毛利数据</title></head>
<body style="font-family:sans-serif;padding:40px;background:#1a1a2e;color:#e0d8ff">
<h2>📥 毛利数据导入</h2>
<pre id="log" style="background:#12122a;padding:20px;border-radius:8px;max-width:700px;white-space:pre-wrap;font-size:13px"></pre>
<script>
const LOG = document.getElementById('log');
function log(m){ LOG.textContent += m + '\n'; }

// 毛利规则：代做=100% | B站商单=60% | 其他=50%
const MARGIN = { '代做':1.0, 'B站商单':0.6, '其他平台商单':0.5, '星广联投':1.0, 'CPM':0.5 };
function calcMargin(fee, platform) {
  const rate = MARGIN[platform] || 0.5;
  return Math.round(fee * rate);
}

const raw = [
  { '项目':'逆水寒手游', '平台':'抖音', '账号':'天机妹', '档期':'4月', '费用':'12000', '备注':'' },
  { '项目':'逆水寒手游', '平台':'抖音', '账号':'麦晓花', '档期':'4月', '费用':'5600', '备注':'' },
  { '项目':'逆水寒手游', '平台':'抖音', '账号':'有事找学姐', '档期':'4月', '费用':'4000', '备注':'' },
  { '项目':'小兵打天下', '平台':'快手', '账号':'花蛮楼', '档期':'4月', '费用':'2100', '备注':'' },
  { '项目':'王者荣耀世界', '平台':'抖音', '账号':'天机妹', '档期':'2026.4.10', '费用':'19418', '备注':'星图60s+报价27740，对客7折，8折下单后返' },
  { '项目':'冒险岛怀旧服', '平台':'抖音', '账号':'麦晓花', '档期':'2026.4.10', '费用':'6825', '备注':'星图60s+报价10000，对客65折，保14w' },
  { '项目':'冒险岛怀旧服', '平台':'抖音', '账号':'有事找学姐', '档期':'2026.4.10', '费用':'5030', '备注':'星图60s+报价7150，对客65折，保17.8w' },
  { '项目':'冒险岛怀旧服', '平台':'B站', '账号':'夏天丶Cat', '档期':'2026.4.10', '费用':'6825', '备注':'花火定制视频报价10000，对客65折，保7w' },
  { '项目':'EVE', '平台':'代做', '账号':'代做499', '档期':'', '费用':'499', '备注':'纯文案无后期，上周已完成发布' },
  { '项目':'战火勋章', '平台':'抖音', '账号':'花蛮楼', '档期':'4/09', '费用':'1680', '备注':'商单' },
  { '项目':'第五人格', '平台':'抖音', '账号':'麦晓花', '档期':'2026.4.1', '费用':'5600', '备注':'返代理30%（俞在洋）' },
  { '项目':'三国杀·武将觉醒', '平台':'抖音', '账号':'麦晓花', '档期':'2026.3.31', '费用':'5600', '备注':'返代理30%（林雨欣商务）' },
  { '项目':'潮汐守望者', '平台':'代做', '账号':'炭叔/温柔主播', '档期':'2026.3.31', '费用':'1000', '备注':'3/31已发布' },
  { '项目':'异环', '平台':'抖音', '账号':'天机妹', '档期':'4月25日', '费用':'20805', '备注':'保密项目，60s+商单，永久不删，50%毛利' },
  { '项目':'忍者必须死3', '平台':'抖音', '账号':'麦晓花', '档期':'4.24或4.30', '费用':'9500', '备注':'全植入；永久保留；信息流授权6个月；免费分发快手/小红书/视频号' },
];

const records = raw.map((it, idx) => {
  const fee = Number(it['费用']) || 0;
  const platform = it['平台'];
  return {
    id: Date.now() + idx,
    '项目': it['项目'] || '',
    '平台': platform,
    '账号': it['账号'] || '',
    '档期': it['档期'] || '',
    '费用': fee,
    '毛利': calcMargin(fee, platform),
    '备注': it['备注'] || ''
  };
});

localStorage.setItem('usagi_profit_g4', JSON.stringify(records));

const totalFee = records.reduce((s,r) => s + r['费用'], 0);
const totalMargin = records.reduce((s,r) => s + r['毛利'], 0);

log('✅ 已导入 ' + records.length + ' 条到「内容四组」');
log('');
log('流水合计: ¥' + totalFee.toLocaleString());
log('毛利合计: ¥' + totalMargin.toLocaleString());
log('目标毛利: ¥100,200');
log('完成率: ' + Math.round(totalMargin / 100200 * 100) + '%');
log('');
log('刷新「流水看板」页面即可看到数据');
</script>
</body>
</html>
